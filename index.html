<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Vernice — Consultazione</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --accent: #5046e5;
    --green: #16a34a;
    --red: #dc2626;
    --gold: #b45309;
    --teal: #0f766e;
    --blue: #1d4ed8;
    --orange: #854d0e;
    --muted: #6b7280;
    --border: #e5e7eb;
    --card: #ffffff;
    --bg: #f3f4f6;
    --ink: #111827;
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--ink); min-height: 100vh; }

  /* HEADER */
  .header { background: #1e1b4b; color: #fff; padding: 14px 16px; display: flex; align-items: center; gap: 10px; position: sticky; top: 0; z-index: 100; }
  .header-logo { font-size: 22px; }
  .header-title { font-size: 17px; font-weight: 700; flex: 1; }
  .header-count { font-size: 12px; color: #a5b4fc; }

  /* SEARCH */
  .search-bar { padding: 12px 16px; background: #fff; border-bottom: 1px solid var(--border); position: sticky; top: 57px; z-index: 99; }
  .search-input { width: 100%; padding: 10px 14px; border: 1.5px solid var(--border); border-radius: 10px; font-size: 16px; outline: none; background: var(--bg); }
  .search-input:focus { border-color: var(--accent); }

  /* FILTRI */
  .filtri { display: flex; gap: 8px; padding: 10px 16px; overflow-x: auto; background: #fff; border-bottom: 1px solid var(--border); position: sticky; top: 113px; z-index: 98; }
  .filtri::-webkit-scrollbar { display: none; }
  .filtro-btn { padding: 6px 14px; border-radius: 20px; border: 1.5px solid var(--border); background: #fff; font-size: 13px; white-space: nowrap; cursor: pointer; color: var(--ink); }
  .filtro-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  /* LISTA */
  .lista { padding: 10px 12px; }
  .empty { text-align: center; color: var(--muted); padding: 40px 20px; font-size: 15px; }

  /* CARD CONTATTO */
  .contact-card { background: var(--card); border-radius: 12px; margin-bottom: 10px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
  .card-header { padding: 14px 16px 10px; display: flex; align-items: flex-start; gap: 10px; cursor: pointer; }
  .card-avatar { width: 40px; height: 40px; border-radius: 50%; background: var(--accent); color: #fff; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 16px; flex-shrink: 0; }
  .card-info { flex: 1; min-width: 0; }
  .card-name { font-weight: 700; font-size: 15px; line-height: 1.3; }
  .card-city { font-size: 13px; color: var(--muted); margin-top: 2px; }
  .card-badges { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
  .badge { padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; }
  .badge-attivo { background: #dcfce7; color: #16a34a; }
  .badge-scaduto { background: #fee2e2; color: #dc2626; }
  .badge-sospeso { background: #f3f4f6; color: #6b7280; }
  .badge-proposta { background: #fef9c3; color: #854d0e; }
  .badge-abb { background: #ede9fe; color: #5046e5; }
  .badge-aut { background: #dbeafe; color: #1d4ed8; }
  .badge-premio { background: #fef3c7; color: #b45309; }
  .card-chevron { color: var(--muted); font-size: 18px; margin-left: 4px; transition: transform .2s; }
  .card-chevron.open { transform: rotate(90deg); }

  /* DETTAGLIO */
  .card-detail { display: none; border-top: 1px solid var(--border); padding: 14px 16px; }
  .card-detail.open { display: block; }
  .detail-section { margin-bottom: 14px; }
  .detail-label { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 6px; }
  .detail-row { display: flex; align-items: flex-start; gap: 8px; font-size: 14px; margin-bottom: 4px; }
  .detail-icon { color: var(--muted); flex-shrink: 0; width: 18px; }
  .num-row { display: flex; align-items: center; gap: 8px; padding: 5px 0; border-bottom: 1px solid #f3f4f6; font-size: 13px; }
  .num-n { font-weight: 700; color: var(--accent); min-width: 42px; }
  .num-data { color: var(--muted); flex: 1; }
  .num-data.sent { color: var(--green); }
  .num-omaggio { font-size: 11px; color: var(--teal); margin-top: 2px; }
  .premio-row { padding: 6px 0; border-bottom: 1px solid #f3f4f6; font-size: 13px; }
  .premio-anno { font-weight: 700; color: var(--gold); }
  .badge-vincitore { background: #fef3c7; color: #b45309; }
  .badge-finalista { background: #dbeafe; color: #1d4ed8; }
  .badge-selezionato { background: #dcfce7; color: #16a34a; }
  .badge-partecipante { background: #f3f4f6; color: #6b7280; }

  /* IMPORT */
  .import-bar { padding: 12px 16px; background: #fff; border-bottom: 1px solid var(--border); display: flex; gap: 8px; align-items: center; }
  .btn-import { padding: 8px 16px; background: var(--accent); color: #fff; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; font-family: inherit; }
  .import-info { font-size: 12px; color: var(--muted); }

  /* CONTATORI */
  .stats-bar { display: flex; gap: 0; background: #fff; border-bottom: 1px solid var(--border); overflow-x: auto; }
  .stats-bar::-webkit-scrollbar { display: none; }
  .stat-item { padding: 10px 16px; text-align: center; flex-shrink: 0; border-right: 1px solid var(--border); }
  .stat-num { font-size: 18px; font-weight: 700; color: var(--accent); }
  .stat-lbl { font-size: 10px; color: var(--muted); text-transform: uppercase; }

  /* CARICA */
  .carica-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 60vh; padding: 30px; text-align: center; }
  .carica-icon { font-size: 60px; margin-bottom: 16px; }
  .carica-title { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
  .carica-sub { font-size: 14px; color: var(--muted); margin-bottom: 24px; line-height: 1.5; }
  .btn-carica { padding: 14px 28px; background: var(--accent); color: #fff; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; font-family: inherit; }

  .pag-footer { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; background: #fff; border-top: 1px solid var(--border); position: sticky; bottom: 0; font-size: 13px; color: var(--muted); }
  .btn-pag { padding: 6px 14px; border: 1.5px solid var(--border); border-radius: 8px; background: #fff; font-size: 13px; cursor: pointer; font-family: inherit; }
  .btn-pag:disabled { opacity: .4; }
</style>
</head>
<body>

<div class="header">
  <div class="header-logo">📖</div>
  <div class="header-title">Genesi Editrice</div>
  <div class="header-count" id="hdr-count"></div>
</div>

<div id="schermata-carica" class="carica-screen">
  <div class="carica-icon">📂</div>
  <div class="carica-title">Vernice — Consultazione</div>
  <div class="carica-sub">Carica il file di backup JSON esportato dall'app principale per consultare i tuoi contatti.</div>
  <button class="btn-carica" onclick="document.getElementById('file-input').click()">📂 Carica backup JSON</button>
  <input type="file" id="file-input" accept=".json" style="display:none" onchange="caricaBackup(this)">
</div>

<div id="app" style="display:none">
  <div class="import-bar">
    <button class="btn-import" onclick="document.getElementById('file-input2').click()">🔄 Aggiorna dati</button>
    <input type="file" id="file-input2" accept=".json" style="display:none" onchange="caricaBackup(this)">
    <span class="import-info" id="import-info"></span>
  </div>

  <div class="stats-bar" id="stats-bar"></div>

  <div class="search-bar">
    <input class="search-input" id="cerca" type="search" placeholder="🔍 Cerca nome, città..." oninput="aggiorna()" autocomplete="off" autocorrect="off" spellcheck="false">
  </div>

  <div class="filtri" id="filtri">
    <button class="filtro-btn active" data-f="" onclick="setFiltro(this)">Tutti</button>
    <button class="filtro-btn" data-f="abbonato" onclick="setFiltro(this)">Abbonati</button>
    <button class="filtro-btn" data-f="attivo" onclick="setFiltro(this)">Attivi</button>
    <button class="filtro-btn" data-f="scaduto" onclick="setFiltro(this)">Scaduti</button>
    <button class="filtro-btn" data-f="proposta" onclick="setFiltro(this)">Proposta</button>
    <button class="filtro-btn" data-f="autore" onclick="setFiltro(this)">Autori</button>
    <button class="filtro-btn" data-f="premio" onclick="setFiltro(this)">Premio</button>
  </div>

  <div class="lista" id="lista"></div>

  <div class="pag-footer" id="pag-footer">
    <button class="btn-pag" id="btn-prec" onclick="cambiaPag(-1)">← Prec.</button>
    <span id="pag-info"></span>
    <button class="btn-pag" id="btn-succ" onclick="cambiaPag(1)">Succ. →</button>
  </div>
</div>

<script>
let dati = [];
let filtroAttivo = '';
let pagina = 0;
const PER_PAG = 25;

function caricaBackup(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const json = JSON.parse(e.target.result);
      dati = json.dati || [];
      const ts = json.ts ? new Date(json.ts).toLocaleDateString('it-IT') : 'N/D';
      document.getElementById('import-info').textContent = 'Aggiornato al ' + ts;
      document.getElementById('schermata-carica').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      localStorage.setItem('vernice_mobile_dati', e.target.result);
      pagina = 0;
      aggiorna();
    } catch(err) {
      alert('Errore nel file: ' + err.message);
    }
  };
  reader.readAsText(file, 'UTF-8');
  input.value = '';
}

function nomeCompleto(d) {
  return ((d.nome||'') + ' ' + (d.cognome||'')).trim();
}

function iniziali(d) {
  const n = d.nome ? d.nome[0] : '';
  const c = d.cognome ? d.cognome[0] : '';
  return (n + c).toUpperCase() || '?';
}

function fmtData(s) {
  if (!s) return '';
  const d = new Date(s);
  if (isNaN(d)) return s;
  return d.toLocaleDateString('it-IT');
}

function setFiltro(btn) {
  document.querySelectorAll('.filtro-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  filtroAttivo = btn.dataset.f;
  pagina = 0;
  aggiorna();
}

function filtra() {
  const q = (document.getElementById('cerca').value || '').toLowerCase();
  return dati.filter(d => {
    if (d.deceduto) return false;
    let ok = true;
    if (filtroAttivo === 'abbonato') ok = d.abbonato;
    else if (filtroAttivo === 'attivo') ok = d.abbonato && d.stato === 'attivo';
    else if (filtroAttivo === 'scaduto') ok = d.abbonato && d.stato === 'scaduto';
    else if (filtroAttivo === 'proposta') ok = d.abbonato && d.stato === 'proposta';
    else if (filtroAttivo === 'autore') ok = d.autore;
    else if (filtroAttivo === 'premio') ok = d.premiMurazzi;
    if (!ok) return false;
    if (!q) return true;
    return (nomeCompleto(d) + ' ' + (d.citta||'') + ' ' + (d.email||'')).toLowerCase().includes(q);
  }).sort((a, b) => (a.cognome||'').localeCompare(b.cognome||''));
}

function aggiorna() {
  const lista = filtra();
  const tot = lista.length;
  const totPag = Math.ceil(tot / PER_PAG);
  if (pagina >= totPag) pagina = 0;
  const slice = lista.slice(pagina * PER_PAG, (pagina + 1) * PER_PAG);

  // stats
  const abb = dati.filter(d => d.abbonato).length;
  const att = dati.filter(d => d.abbonato && d.stato === 'attivo').length;
  const aut = dati.filter(d => d.autore).length;
  const prm = dati.filter(d => d.premiMurazzi).length;
  document.getElementById('stats-bar').innerHTML = `
    <div class="stat-item"><div class="stat-num">${dati.length}</div><div class="stat-lbl">Contatti</div></div>
    <div class="stat-item"><div class="stat-num">${abb}</div><div class="stat-lbl">Abbonati</div></div>
    <div class="stat-item"><div class="stat-num" style="color:var(--green)">${att}</div><div class="stat-lbl">Attivi</div></div>
    <div class="stat-item"><div class="stat-num" style="color:var(--blue)">${aut}</div><div class="stat-lbl">Autori</div></div>
    <div class="stat-item"><div class="stat-num" style="color:var(--gold)">${prm}</div><div class="stat-lbl">Premio</div></div>
  `;
  document.getElementById('hdr-count').textContent = tot + ' risultati';

  // lista
  if (!slice.length) {
    document.getElementById('lista').innerHTML = '<div class="empty">Nessun risultato</div>';
  } else {
    document.getElementById('lista').innerHTML = slice.map(r => renderCard(r)).join('');
  }

  // paginazione
  const da = pagina * PER_PAG + 1;
  const a = Math.min((pagina + 1) * PER_PAG, tot);
  document.getElementById('pag-info').textContent = tot > 0 ? `${da}–${a} di ${tot}` : '';
  document.getElementById('btn-prec').disabled = pagina === 0;
  document.getElementById('btn-succ').disabled = pagina >= totPag - 1;
  document.getElementById('pag-footer').style.display = totPag <= 1 ? 'none' : 'flex';
}

function renderCard(r) {
  const nome = nomeCompleto(r);
  const titolo = r.titolo ? r.titolo + ' ' : '';
  const badges = [];
  if (r.abbonato) {
    const stato = r.stato || 'attivo';
    const label = stato === 'proposta' ? 'Proposta' : stato.charAt(0).toUpperCase() + stato.slice(1);
    badges.push(`<span class="badge badge-${stato}">${label}</span>`);
  }
  if (r.autore) badges.push('<span class="badge badge-aut">Autore</span>');
  if (r.premiMurazzi) badges.push('<span class="badge badge-premio">Premio</span>');

  // numeri recenti (ultimi 3)
  const numeri = (r.numeri || []).slice(-3).reverse();
  const numHtml = numeri.map(n => {
    const inviato = n.data;
    const om = (n.omaggi || []).length ? `<div class="num-omaggio">🎁 ${n.omaggi.join(', ')}</div>` : '';
    return `<div class="num-row">
      <span class="num-n">N°${n.n}</span>
      <div class="num-data ${inviato ? 'sent' : ''}">
        ${inviato ? '✓ ' + fmtData(n.data) : 'Da inviare'}
        ${om}
      </div>
    </div>`;
  }).join('');

  // premio
  const premi = (r.premio || []).sort((a,b) => b.anno - a.anno).slice(0, 3);
  const premioHtml = premi.map(p => {
    const ris = p.risultato || 'Partecipante';
    const cls = 'badge-' + ris.toLowerCase();
    return `<div class="premio-row">
      <span class="premio-anno">${p.anno}</span>
      ${p.edizione ? ' · ' + p.edizione + ' ed.' : ''}
      — ${p.sezione}
      <br><span class="badge ${cls}" style="margin-top:3px;display:inline-block">${ris}</span>
      ${p.opera ? '<br><span style="font-size:12px;color:var(--muted)">' + p.opera + '</span>' : ''}
    </div>`;
  }).join('');

  // libri (autore)
  const libri = (r.libri || []).slice(0, 3);
  const libriHtml = libri.map(l => `<div style="font-size:13px;padding:4px 0;border-bottom:1px solid #f3f4f6">
    <strong>${l.titolo||'—'}</strong>
    ${l.anno ? '<span style="color:var(--muted);font-size:12px"> · ' + l.anno + '</span>' : ''}
    ${l.collana ? '<br><span style="font-size:12px;color:var(--muted)">' + l.collana + '</span>' : ''}
  </div>`).join('');

  return `<div class="contact-card">
    <div class="card-header" onclick="toggleCard(this)">
      <div class="card-avatar" style="background:${avatarColor(r)}">${iniziali(r)}</div>
      <div class="card-info">
        <div class="card-name">${titolo}${nome}</div>
        ${r.citta ? `<div class="card-city">📍 ${r.citta}</div>` : ''}
        <div class="card-badges">${badges.join('')}</div>
      </div>
      <div class="card-chevron">›</div>
    </div>
    <div class="card-detail">
      ${r.ind ? `<div class="detail-section">
        <div class="detail-label">Indirizzo</div>
        <div class="detail-row"><span class="detail-icon">🏠</span><span>${r.ind}, ${r.cap || ''} ${r.citta || ''}</span></div>
      </div>` : ''}
      ${r.tel && r.tel.length ? `<div class="detail-row"><span class="detail-icon">📞</span><a href="tel:${r.tel[0]}" style="color:var(--accent)">${r.tel[0]}</a></div>` : ''}
      ${r.email ? `<div class="detail-row"><span class="detail-icon">✉</span><a href="mailto:${r.email}" style="color:var(--accent)">${r.email}</a></div>` : ''}
      ${r.abbonato && numeri.length ? `<div class="detail-section" style="margin-top:10px">
        <div class="detail-label">Ultimi numeri Vernice</div>
        ${numHtml}
      </div>` : ''}
      ${r.autore && libri.length ? `<div class="detail-section" style="margin-top:10px">
        <div class="detail-label">Libri pubblicati</div>
        ${libriHtml}
      </div>` : ''}
      ${r.premiMurazzi && premi.length ? `<div class="detail-section" style="margin-top:10px">
        <div class="detail-label">Premio I Murazzi</div>
        ${premioHtml}
      </div>` : ''}
      ${r.note ? `<div class="detail-section" style="margin-top:10px">
        <div class="detail-label">Note</div>
        <div style="font-size:13px;color:var(--muted)">${r.note}</div>
      </div>` : ''}
    </div>
  </div>`;
}

function avatarColor(r) {
  if (r.abbonato && r.stato === 'attivo') return '#5046e5';
  if (r.abbonato && r.stato === 'scaduto') return '#dc2626';
  if (r.abbonato && r.stato === 'proposta') return '#854d0e';
  if (r.autore) return '#1d4ed8';
  if (r.premiMurazzi) return '#b45309';
  return '#6b7280';
}

function toggleCard(header) {
  const chevron = header.querySelector('.card-chevron');
  const detail = header.nextElementSibling;
  const isOpen = detail.classList.contains('open');
  // Chiudi tutti
  document.querySelectorAll('.card-detail.open').forEach(d => d.classList.remove('open'));
  document.querySelectorAll('.card-chevron.open').forEach(c => c.classList.remove('open'));
  if (!isOpen) {
    detail.classList.add('open');
    chevron.classList.add('open');
  }
}

function cambiaPag(dir) {
  pagina += dir;
  aggiorna();
  window.scrollTo(0, 0);
}

// Carica dati salvati
const saved = localStorage.getItem('vernice_mobile_dati');
if (saved) {
  try {
    const json = JSON.parse(saved);
    dati = json.dati || [];
    const ts = json.ts ? new Date(json.ts).toLocaleDateString('it-IT') : 'N/D';
    document.getElementById('import-info').textContent = 'Aggiornato al ' + ts;
    document.getElementById('schermata-carica').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    aggiorna();
  } catch(e) {}
}
</script>
</body>
</html>
